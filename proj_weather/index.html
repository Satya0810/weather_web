<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" , content="width=device-width , initial-scale=1.0">
       
<!--
   
  - name="viewport"        : Targets the visible area of the browser window (viewport).
  - width=device-width     : Sets the page width equal to the device's screen width.
  - initial-scale=1.0      : Sets the initial zoom level to normal (no zoom) on page load.
-->

        <title>
weather app
        </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="card">
            <div class="search">
                <!--
  - placeholder="Enter your name..."  : Shows a hint/ghost text inside the input field
                                        when it is empty. Disappears when user starts typing.
                                   
-->
                <input type="text" placeholder="enter city name" spellcheck="false">
                <!--
  - spellcheck="true"   : Browser automatically checks spelling using its own built-in
                          dictionary. No word list needed — it does it on its own.
  - spellcheck="false"  : Disables the automatic spell checking.
-->
                <button><img src="search.png" alt=""></button>
            </div>
            <div class="weather">
                <img src="weather.png" alt="" class="weather-icon">
                <h1 class="temp">22&#8451;</h1>
                <h2 class="city">
                    New York
                </h2>
                <div class="details">
                    <div class="col">
                        <img src="humidity.png" alt="">
                        <div>
                            <p class="humidity">
                                50%
                            </p>
                            <p>Humidity</p>
                        </div>
                    </div>
                    <div class="col">
                        <img src="windy.png" alt="">
                        <div>
                            <p class="wind">15 km/h</p>
                            <p>wind speed</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
<script>
    const apiKey="4ecdc734306c09f2e5cd0b1177a01e74";
    const apiUrl =  "https://api.openweathermap.org/data/2.5/weather?q=";
   const searchBox = document.querySelector(".search input");
      const searchBtn = document.querySelector(".search button");
      const weatherIcon = document.querySelector(".weather-icon");

    async function checkWeather(city){
        const response =await fetch(apiUrl +city+ `&appid=${apiKey}&units=metric`);
        var data=await response.json();
        if(data.cod === "404") {
        alert("City not found. Please enter a valid city name.");
        return;  // stop here, don't try to update the UI
    }
        console.log(data);

 document.querySelector(".city").innerHTML=data.name;
    document.querySelector(".temp").innerHTML=Math.round(data.main.temp )+ "&#8451;";
    document.querySelector(".humidity").innerHTML=data.main.humidity +"%";
    document.querySelector(".wind").innerHTML=data.wind.speed +" Km/hr";
    if(data.weather[0].main=="Clouds"){
            weatherIcon.src="cloudy.png";
    }else if(data.weather[0].main=="Clear"){
           weatherIcon.src="sun.png";
    }else if(data.weather[0].main=="Rain"){
           weatherIcon.src="rainy.png";
    }else if(data.weather[0].main=="haze"){
           weatherIcon.src="haze.png";
    }else{
 weatherIcon.src="storm.png";
    }
    document.querySelector(".weather").style.display="block";
    }
    searchBtn.addEventListener("click",()=>{
        checkWeather(searchBox.value.trim());
    })
    
   
</script>
    </body>
</html>
